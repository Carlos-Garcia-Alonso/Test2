<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Photography gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" media="screen" href="style.css" />
    <!-- Tipografías de Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-custom-black">
        <div class="container d-flex justify-content-center align-items-center">
          <!-- La transición del ejercicio está en el hover de este enlace -->
          <a class="navbar-expand-lg" href="index_2.html">Change Gallery</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="primera text-center pt-5 pb-5">
        <header class="primera-2">
          <p class="subtitulo mb-1">Photograpy, inspiration, connection</p>
          <h1><strong>Mist Eyes</strong></h1>
          <div class="primera-2-1 pt-3 sm">
            <div class="primera-2-1-1 text-start">
              <hr />
              <p>#ffff</p>
            </div>
            <figure class="primera-2-1-2">
              <p class="texto-ojos text-end">look</p>
              <img src="assets/img0.jpg" class="img-0 shadow" alt="Eyes" />
              <p class="texto-ojos-2 text-center">deeper</p>
            </figure>
          </div>
        </header>
        <div class="primera-3"></div>
      </section>

      <section class="segunda">
        <figure>
          <blockquote>
            "A portrait is not made in the camera but on either side of it"
          </blockquote>
          <figcaption>— Edward Steichen</figcaption>
        </figure>
      </section>

      <section class="tercera bg-custom-black">
        <div class="tercera-1-1 text-end">
          <hr />
          <p>#050505</p>
        </div>
        <div
          id="myCarousel"
          class="tercera-1 carousel slide"
          data-bs-ride="carousel"
          data-bs-interval="3000"
        >
          <div class="carousel-inner">
            <figure class="carousel-item active">
              <img
                src="assets/img1.jpg"
                data-full="assets/img1.jpg"
                data-title="LAURA 01"
                data-description="EXT - Laura Lorenzo"
                class="d-block w-100 openModal"
              />
            </figure>
            <figure class="carousel-item">
              <img
                src="assets/img2.jpg"
                data-full="assets/img2.jpg"
                data-title="LORENA 01"
                data-description="INT - Lorena Domínguez"
                class="d-block w-100 openModal"
              />
            </figure>
            <figure class="carousel-item">
              <img
                src="assets/img3.jpg"
                data-full="assets/img3.jpg"
                data-title="OLATZ 01"
                data-description="INT - Olatz Vilas"
                class="d-block w-100 openModal"
              />
            </figure>
          </div>

          <button
            class="carousel-control-prev"
            data-bs-target="#myCarousel"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button
            class="carousel-control-next"
            data-bs-target="#myCarousel"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
        <figure class="tercera-2 text-start">
          <img
            src="assets/gradient.jpg"
            class="gradient shadow"
            alt="Gradient"
          />
          <hr />
          <p>#CANON B&W</p>
        </figure>
      </section>

      <section class="cuarta text-center pt-5 pb-5">
        <div class="d-flex align-items-center justify-content-center cuarta-1">
          <!-- La animación del ejercicio está este article -->
          <div class="text-center cuarta-1-1">
            <h3>Galería</h3>
            <h3>Galerie</h3>
            <h3>Galleria</h3>
            <h3>Galerie</h3>
            <h3>Gallery</h3>
            <h3>Galerij</h3>
            <h3>Galleri</h3>
            <h3>ギャラリ</h3>
            <h3>Galeria</h3>
          </div>
        </div>
        <figure class="cuarta-2">
          <img
            src="assets/img4.jpg"
            data-full="assets/img4.jpg"
            data-title="OLATZ 02"
            data-description="INT - Olatz Vilas"
            class="d-block w-100 openModal"
          />
        </figure>
      </section>

      <section class="quinto text-center">
        <img
          src="assets/img1.jpg"
          data-full="assets/img1.jpg"
          data-title="LAURA 01"
          data-description="INT - Laura Lorenzo"
          class="openModal"
        />
        <img
          src="assets/img2.jpg"
          data-full="assets/img2.jpg"
          data-title="LORENA 01"
          data-description="INT - Lorena Domínguez"
          class="openModal"
        />
        <img
          src="assets/img3.jpg"
          data-full="assets/img3.jpg"
          data-title="OLATZ 02"
          data-description="INT - Olatz Vilas"
          class="openModal"
        />
        <img
          src="assets/img5.jpg"
          data-full="assets/img5.jpg"
          data-title="LAURA 02"
          data-description="INT - Laura Lorenzo"
          class="openModal"
        />
      </section>

      <section class="quinto last text-center">
        <img
          src="assets/img9.jpg"
          data-full="assets/img9.jpg"
          data-title="LORENA 02"
          data-description="INT - Lorena Domínguez"
          class="openModal"
        />
        <img
          src="assets/img6.jpg"
          data-full="assets/img6.jpg"
          data-title="AARÓN 01"
          data-description="EXT - Aarón Bello"
          class="openModal"
        />
        <img
          src="assets/img7.jpg"
          data-full="assets/img7.jpg"
          data-title="PATRICIA 01"
          data-description="EXT - Patricia Villalón"
          class="openModal"
        />
        <img
          src="assets/img8.jpg"
          data-full="assets/img8.jpg"
          data-title="LEGESE 01"
          data-description="INT - Legese García"
          class="openModal"
        />
      </section>
      <div class="sexta"></div>
    </main>

    <footer>
      <p>Carlos García Alonso - Diseño de Interfaces Web - 2025</p>
    </footer>
    <!--Plantilla para que rellene automáticamente el script de JS -->
    <div class="modal" id="imageModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Título</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body text-center">
            <img
              src=""
              id="modalImage"
              class="img-fluid"
              alt="Imagen ampliada"
            />
            <p class="mt-3 text-muted" id="modalDescription">Descripción</p>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Enlace al script que rellena el modal -->
    <script src="modal.js"></script>
  </body>
</html>
